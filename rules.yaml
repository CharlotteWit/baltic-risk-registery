# rules.yaml — the transparent risk-scoring rules.
#
# This file is the WHOLE scoring logic. There is no hidden scoring anywhere else.
# Anyone can read and edit these weights; the engine (built in M5) reads this file
# and records, for every vessel, exactly which rules fired and the evidence behind
# each. Change a weight here, re-run, and the scores change accordingly.
#
# Calibration (2026-06-18, by the user):
#   * AGE weighs highest — an old hull is the core environmental-spill risk on its
#     own, sanctioned or not (R1=5, R1b=3).
#   * PSC detention (R6=2) weighs heavier than the context factors: these ships
#     were actually inspected and detained.
#   * Flag/name changes, FoC flag, and sanctions listing are all context pointing
#     to the same shadow-fleet scenario, so each counts 1 (R3, R4, R5, R10).
#   * REMOVED rules we cannot evaluate with our data: R2 (no insurer data),
#     R7 (AIS gaps — cannot collect), R8 (Russian-terminal calls — no AIS
#     coverage), R9 (loitering — cannot define reliably). They are gone, not
#     silently zeroed.

rules:
  - id: R1
    description: "Vessel age over 20 years"
    weight: 5
    data_source: "built_year fact (e.g. Equasis / registry / Wikidata)"

  - id: R1b
    description: "Vessel age 15-20 years"
    weight: 3
    data_source: "built_year fact"

  - id: R3
    description: "Flag changed within the last 12 months"
    weight: 1
    data_source: "history of flag facts (identity_history)"

  - id: R4
    description: "Name changed within the last 12 months"
    weight: 1
    data_source: "history of name facts (identity_history)"

  - id: R5
    description: "Flag is a high flag-of-convenience-risk flag"
    weight: 1
    data_source: "current flag fact + foc_flags list below"

  - id: R6
    description: "Paris MoU (or other PSC) detention/ban (already inspected & detained)"
    weight: 2
    data_source: "Port State Control detention records (via OpenSanctions)"

  - id: R8d
    description: "Transited toward the eastern Gulf of Finland (exited east) with a destination that is unknown or contradicted by the eastbound course — low confidence, NOT a confirmed call"
    weight: 1
    confidence: low
    data_source: "eastbound_transit inference (positions + ais_destination fact)"

  - id: R10
    description: "Listed by EU / OFAC / UK / GUR"
    weight: 1
    data_source: "list_membership table"

  - id: R11
    description: "Carries oil / crude / gas / chemicals (tanker — high spill risk)"
    weight: 2
    data_source: "vessel_type fact and/or AIS ship-type category 'tanker'"

  - id: R12
    description: "Three or more distinct names on record (identity churn; 2 can be a genuine rename)"
    weight: 1
    data_source: "identity_history name history (>= 3 distinct names)"

# Score bands. Every score must still be expandable into the list of rules that
# fired and the evidence behind each. (Realistic max with current rules ~12.)
bands:
  - {name: low,      min: 0, max: 3}
  - {name: elevated, min: 4, max: 7}
  - {name: high,     min: 8, max: 9999}

# Flags commonly associated with elevated flag-of-convenience risk (used by R5).
# ISO 3166-1 alpha-2 codes (lower-case) — this is what our flag facts/AIS use.
# Editable; the country name is given as a comment. Document why you add one.
foc_flags:
  - pa   # Panama
  - lr   # Liberia
  - mh   # Marshall Islands
  - ck   # Cook Islands
  - km   # Comoros
  - ga   # Gabon
  - pw   # Palau
  - st   # Sao Tome and Principe
  - cm   # Cameroon
  - bb   # Barbados
  - dj   # Djibouti
