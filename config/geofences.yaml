# geofences.yaml — geographic scope and watched terminals.
#
# Bounding boxes are approximate (from PROJECT_BRIEF 2.2) and can be refined.
# aisstream.io (used in M3) accepts bounding boxes as [[lat_min, lon_min],
# [lat_max, lon_max]] pairs; we keep them here in a readable form.

bounding_boxes:
  baltic_sea:
    lat_min: 53.5
    lat_max: 66.0
    lon_min: 9.0
    lon_max: 30.0
  danish_straits:
    lat_min: 54.5
    lat_max: 58.0
    lon_min: 9.5
    lon_max: 13.0
  north_sea:
    lat_min: 51.0
    lat_max: 61.0
    lon_min: -4.0
    lon_max: 9.0

# Russian oil terminals to flag for R8. Coordinates are approximate centres;
# the port-call inference (M4) uses a radius around each. Verify/refine later.
russian_oil_terminals:
  - {name: Primorsk,     country: Russia, lat: 60.34, lon: 28.61, radius_km: 12}
  - {name: Ust-Luga,     country: Russia, lat: 59.66, lon: 28.27, radius_km: 12}
  - {name: Novorossiysk, country: Russia, lat: 44.72, lon: 37.78, radius_km: 12}
  - {name: Kozmino,      country: Russia, lat: 42.73, lon: 133.06, radius_km: 12}
